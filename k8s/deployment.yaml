apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictac
  namespace: tictac
  labels:
    app: game
spec:
  selector:
    matchLabels:
      app: game
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: game
    spec:
      containers:
      - name: tictac
        image: ghcr.io/Devops-Raja/repo:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "0.5"
            memory: "250Mi"
          limits:
            cpu: "0.75"
            memory: "500Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        ports:
        - containerPort: 80
          name: tictac
      restartPolicy: Always
